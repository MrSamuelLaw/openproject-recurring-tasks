volumes:
  openproject-recurring-tasks-netbird-client:

services:
  openproject-recurring-tasks:
    build: .
    network_mode: service:netbird-client
    restart: unless-stopped
    image: openproject-recurring-tasks
    container_name: openproject-recurring-tasks
    env_file: ".env"
    environment:
      TZ: America/Chicago
    volumes:
      - type: bind
        source: ./app
        target: /app
    depends_on:
      - netbird-client
  
  netbird-client:
    image: netbirdio/netbird:latest
    container_name: openproject-recurring-tasks-netbird-client
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
    devices:
      - /dev/net/tun
    environment:
      - NB_SETUP_KEY=YourSetupKeyHere
      - NB_HOSTNAME=openproject-recurring-tasks
      - NB_MANAGEMENT_URL=https://netbird.yourdomain.example
    volumes:
      - openproject-recurring-tasks-netbird-client:/var/lib/netbird
    restart: unless-stopped
